<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

<link rel="stylesheet" href="assets/slick/slick.css">

<body>
  <!-- HEADER -->
  <header>
    <div class="container">
      <div class="logo"><a href="https://smiletaiwan.cw.com.tw/" target="_blank"><img src="assets/images/logo.png" alt=""></a></div>
      <div class="hamberger"><span></span></div>
      <nav>
        <div class="close"></div>
        <ul>
          <li data-link="interactive-game"><a href="#interactive-game">測驗挑戰</a></li>
          <li data-link="data-map"><a href="#data-map">關鍵趨勢</a></li>
          <li data-link="deep-analysis"><a href="#deep-analysis">深度解析</a></li>
          <li data-link="theme-report"><a href="#theme-report">主題報導</a></li>
          <li data-link="download-toolbox">
            <a 
              class="pdf-link-click"
              href="https://web.cw.com.tw/activity/redirect/59aa3a73-b4a0-4054-bdce-4952f34a84c3"
              target="_blank"
              gtm-name="下載工具箱"
              eventaction="download-link"
              eventlabel="工具箱PDF"
            >
              下載工具箱
            </a>
          </li>
          <li data-link="twsustainability2026"><a href="https://smiletaiwan.cw.com.tw/feature/twsustainability2026" target="_blank">2026永續城鄉論壇</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <!-- 全村的希望 -->
    <section class="game" id="interactive-game">
      <div class="container" data-aos="fade-up" data-aos-duration="600">
        <!-- 初始畫面 -->
        <div class="game-entro flex">
          <div class="wrap-container">
            <div class="info-box">
              <div class="bar"></div>
              <div class="content">
                <p>某天早上起床，你突然收到一份神秘的任務......</p>
                <div class="hint">
                  <p class="title">任務指示</p>
                  <p>你必須治理一座2300人的村莊，這裡高齡少子化，光是長輩就超過460位，更不用說年輕人多數離鄉就學、就業。作為全村希望的你，需要克服這個地方所面臨的困境。</p>
                </div>
              </div>
              <span class="deco green"></span>
              <span class="deco orange"></span>
              <span class="deco envelope"></span>
            </div>
            <div class="submit-box">
              <div class="name-box">
                <div class="name-input-wrap">
                  <input
                    type="text"
                    id="userName"
                    name="userName"
                    autocomplete="off"
                    aria-label="請輸入姓名"
                  >
                  <span class="name-placeholder">
                    請輸入姓名
                  </span>
                </div>
                <p>看你會成為什麼樣的村長吧！</p>
              </div>
              <button 
                type="button"
                class="game-start-btn game-link-click"
                gtm-name="遊戲開始"
                eventaction="bn0-link"
                eventlabel="開始bn0"
              >
                開始執行任務
              </button>
            </div>
          </div>
        </div>
        <!-- 測驗過程 -->
        <div class="game-main flex" hidden>
          <div class="wrap-container">
            <!-- 問題區 -->
            <div class="question-box flex">
              
              <p class="flex">
                <!-- Q+{題號} -->
                <span class="number">Q1</span>
                <!-- {題目} -->
                <span class="question-text">村裡緊急備用金告急，必須增加地方收入，你會怎麼做？</span>
              </p>
              <img class="question-image" src="assets/images/game-main_img01.png" alt="">
            </div>
            <!-- 選項區 -->
            <div class="answer-box flex">
              <button
                type="button"
                class="answer-card flex game-link-click"
                gtm-name="第{題號}題回答"
                eventaction="bn{題號}-link"
                eventlabel="回答bn{題號}"
                data-choice="A"
              >
                <img src="assets/images/game-main_a.svg" alt="選項 A">
                <!-- {選項 A} -->
                <p class="answer" data-type="">開發農地蓋工廠，快速補血財庫</p>
              </button>
              <button
                type="button"
                class="answer-card flex game-link-click"
                gtm-name="第{題號}題回答"
                eventaction="bn{題號}-link"
                eventlabel="回答bn{題號}"
                data-choice="B"
              >
                <img src="assets/images/game-main_b.svg" alt="選項 B">
                <!-- {選項 B} -->
                <p class="answer" data-type="">守護土地，靠舉辦生態體驗慢慢把錢賺回來</p>
              </button>
            </div>
            <!-- 進度條 -->
            <div class="game-percent"><span></span></div>
          </div>
        </div>
        <!-- 測驗結果 -->
        <div class="game-result flex" hidden>
          <div class="wrap-container flex">
            <div class="info-box">
              <img src="assets/images/top-slogan.svg" alt="" class="slogan pconly">
              <div class="btn-box flex">
                <!-- 回到game-main -->
                <button 
                  type="button" 
                  class="game-btn game-retry flex game-link-click"
                  gtm-name="遊戲結束"
                  eventaction="bn-retry"
                  eventlabel="再玩一次-{結果卡編號}"
                >
                  <span></span>
                  再玩一次
                </button>
                <!-- 下載含username的game-result圖檔 -->
                <button 
                  type="button" 
                  class="game-btn game-download flex game-link-click"
                  gtm-name="遊戲結束"
                  eventaction="bn-download"
                  eventlabel="下載結果-{結果卡編號}"
                >
                  <span></span>
                  下載結果
                </button>
              </div>
            </div>
            <div class="card-box">
              <!-- src="assets/images/game-result/game-result_+{結果卡編號}+.png" -->
              <img src="assets/images/game-result/game-result_1.png" alt="">
              <!-- {userName} -->
              <p class="name">是我亂取的名字</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <!-- JS -->
  <!-- jquery -->
  <script type="text/javascript" src="//code.jquery.com/jquery-1.11.0.min.js"></script>
  <!-- aos -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <!-- slick -->
  <script type="text/javascript" src="assets/js/slick.min.js"></script>
  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- custom -->
  <script src="assets/js/common.js"></script>
</body>
</html>
